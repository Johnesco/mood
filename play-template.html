<!-- Mood Gallery — MoodEngine v2 comprehensive showcase
     Every engine feature demonstrated: vibes, presets, palettes, triggers,
     effects, states, ambient particles, persistent effects, intro mode.

     Template tokens (substituted by setup_web.py / compile.py):
       __TITLE__      — Game title
       __STORY_FILE__ — Binary filename
       __STORY_PATH__ — Full path to binary
       __LIB_PATH__   — Parchment library path
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<meta name="viewport" content="width=device-width, user-scalable=no">
<link rel="stylesheet" href="__LIB_PATH__parchment.css">
<link rel="stylesheet" href="__LIB_PATH__main.css">
</head>
<body style="background:#0a0a0a; margin:0; overflow:hidden">

<div id="gameport">
  <div id="windowport">
    <noscript>
      <div style="text-align:center; padding:40px; color:#708090;">
        <h2>__TITLE__</h2>
        <p>JavaScript is required to play this game.</p>
      </div>
    </noscript>
  </div>
  <div id="loadingpane">
    <div style="margin-bottom:20px; font-size:1.4em; color:#607080; letter-spacing:6px;">MOOD GALLERY</div>
    <img src="__LIB_PATH__waiting.gif" alt="Loading" style="opacity:0.4"><br>
    <em>Loading...</em>
  </div>
  <div id="errorpane" style="display:none;">
    <div id="errorcontent">...</div>
  </div>
</div>

<script src="__LIB_PATH__jquery.min.js"></script>
<script src="__LIB_PATH__ie.js" nomodule></script>
<script>
parchment_options = {
  default_story: ['__STORY_PATH__'],
  lib_path: '__LIB_PATH__',
  story_name: '__STORY_FILE__',
  use_proxy: 0,
  do_vm_autosave: 1
};
</script>
<script src="__LIB_PATH__parchment.js"></script>

  fallbackZone: 'entrance',

  // ══════════════════════════════════════════════════════════════

  // ══════════════════════════════════════════════════════════════
  roomZones: {
    // Floor 1
    'Entrance Hall': 'entrance',
    'Vibe Wing': 'cozy', 'Cozy Alcove': 'cozy',
    'Stark Chamber': 'stark',
    'Vibe Wing North': 'entrance',
    'Retro Terminal': 'retro', 'Gothic Study': 'gothic',
    'Clinical Suite': 'clinical', 'Custom Workshop': 'clinical',
    'Color Gallery': 'entrance',
    'Dark Passage': 'dark-color', 'Parchment Chamber': 'parchment-color',
    'Ice Chamber': 'ice-color',
    'Terminal Room': 'terminal-color', 'Sepia Room': 'sepia-color',
    'Clinical Room': 'clinical-color',
    'Typography Hall': 'typography', 'Font Showcase': 'typography',

    // Floor 2
    'Effects Corridor': 'effects',
    'Tremor Room': 'effects', 'Flash Room': 'effects',
    'Particle Hall': 'effects-particles',
    'Shard Gallery': 'effects-particles', 'Spark Forge': 'effects-particles', 'Ember Pit': 'effects-particles',
    'Reaction Hall': 'effects', 'Ripple Pool': 'effects-water', 'Glitch Lab': 'effects',
    'Overlay Passage': 'effects', 'Vignette Nook': 'effects',
    'Water Hall': 'effects-water', 'Flood Basin': 'effects-water', 'Drain Pit': 'effects-water',
    'Sensation Hall': 'effects', 'Pulse Chamber': 'effects', 'Fade Corridor': 'effects',
    'Inscription Hall': 'effects', 'Glow Script Room': 'effects', 'Inversion Chamber': 'effects',
    'Arena Gate': 'effects', 'Shockwave Arena': 'effects', 'Aura Sanctum': 'effects-aura',

    'Autumn Path': 'atmosphere-leaves', 'Snowfield': 'atmosphere-snow',
    'Weather Crossing': 'atmosphere-rain',
    'Storm Gallery': 'atmosphere-rain', 'Dust Archive': 'atmosphere-dust',
    'Element Path': 'atmosphere-embers',
    'Furnace Walk': 'atmosphere-embers', 'Twilight Garden': 'atmosphere-fireflies',

    // Floor 3
    'Persistent Hall': 'persistent',
    'Sway Chamber': 'persistent-sway', 'Glow Chamber': 'persistent-glow',
    'State Corridor': 'state-corridor', 'Distortion Chamber': 'state-distortion',
    'Trigger Lab': 'trigger-lab',
    'The Vault': 'vault'
  },

  // ══════════════════════════════════════════════════════════════
  //  STATES — palette overrides + persistent effects
  // ══════════════════════════════════════════════════════════════
  states: {
    distortion: {
      palettes: {
        'state-distortion': {
          bufferBg:'#18140a', bufferFg:'#d0c090', gridBg:'#241c0a', gridFg:'#a08830',
          accent:'#d0a020', uiBg:'#18140a', border:'#302408'
        }
      },
      effects: {
        distortion: { duration: 30, intensity: 0.7 },
        vignette: { duration: 30 }
      }
    },
    chromatic: {
      palettes: {
        'state-corridor': {
          bufferBg:'#100a14', bufferFg:'#c0a8d0', gridBg:'#1a1028', gridFg:'#785898',
          accent:'#a060c8', uiBg:'#100a14', border:'#201438'

      effects: {
        chromatic: { frequency: 5, intensity: 0.35 }

    'visual-static': {

      effects: {
        'static': { frequency: 6, intensity: 0.08 }

        chromatic: { frequency: 8, intensity: 0.15 }

    { on: 'ground trembles',      effect: 'shake',     intensity: 0.8 },
    { on: 'gentle tremor',        effect: 'shake',     intensity: 0.2 },
    { on: 'Light erupts',         effect: 'flash',     intensity: 1.0, size: 'large' },

    { on: 'Embers scatter',       effect: 'particles', particle: 'embers', count: 15 },
    { on: 'Ripples spread',       effect: 'ripple',    duration: 3000 },
    { on: 'Static crackles',      effect: 'glitch',    duration: 1500 },

    { on: 'ancient words glow',   effect: 'textGlow',  color: '#ffd700', duration: 3000 },
    { on: 'Reality inverts',      effect: 'invert',    duration: 800 },
    { on: 'shockwave expands',    effect: 'shockwave', count: 7, color: '#60c0ff', duration: 2500 },

    { on: /placed .* on the pedestal/i, effect: 'textGlow', color: '#ffd700', duration: 2000 },
    { on: /earthquake/i,                effect: 'shake',    intensity: 1.0 },

    { on: 'Colors normalize',          clearState: 'chromatic' },
    { on: 'Static fills your vision',  setState: 'visual-static', delay: 2000, once: true },
    { on: 'static fades',              clearState: 'visual-static' }

  // ══════════════════════════════════════════════════════════════
  //  CELEBRATION CALLBACK — fires when all 10 artifacts placed
  // ══════════════════════════════════════════════════════════════
  onBufferText: function(text) {
    if (/The gallery resonates/i.test(text)) {
      MoodEngine.fireEffect('shake', { intensity: 0.5 });
      MoodEngine.setState('celebration');
      setTimeout(function() {
        MoodEngine.fireEffect('flash', { color: 'rgba(255,215,0,0.5)', size: 'large', intensity: 1.0 });
      }, 200);
      setTimeout(function() {
        MoodEngine.fireEffect('shockwave', { count: 7, color: '#ffd700', duration: 3000 });
      }, 800);
      setTimeout(function() {
        MoodEngine.fireEffect('particles', {
          particle: 'sparks', count: 40,
          colors: ['#ffd700','#ff8c00','#ffffff','#ffe066','#ffaa00','#ff4444','#44ff44','#4444ff']
        });
      }, 1200);
      setTimeout(function() {
        MoodEngine.fireEffect('textGlow', { color: '#ffd700', duration: 4000 });
      }, 1800);
      setTimeout(function() {
        MoodEngine.fireEffect('ambient', { particle: 'fireflies', count: 40 });
      }, 2500);
      setTimeout(function() {
        MoodEngine.fireEffect('aura', { color: 'rgba(255,215,0,0.15)', intensity: 'bright' });
      }, 3000);
      setTimeout(function() {
        MoodEngine.fireEffect('pulse', { color: '#ffd700', duration: 2000 });
      }, 4000);
    }
